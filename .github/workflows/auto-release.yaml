name: Auto Release GeoSite

on:
  push:
    branches:
      - master
    paths:
      - 'release/**'
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Parse Date, Format Name and Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd release

          MARKER_FILE=$(ls | grep -E '^[0-9]{6}$' | head -n 1)

          if [ -z "$MARKER_FILE" ]; then
            echo "Маркерный файл не найден в папке release. Пропуск."
            exit 0
          fi

          TAG=$MARKER_FILE

          YY=${TAG:0:2}
          MM=${TAG:2:2}
          DD=${TAG:4:2}

          MM=$((10#$MM))
          DD=$((10#$DD))

          RELEASE_NAME="zkeen-domains-${YY}.${MM}.${DD}"

          if [ ! -f "zkeen.dat" ]; then
            echo "Ошибка: Файл zkeen.dat не найден в папке release!"
            exit 1
          fi

          SHA256=$(sha256sum zkeen.dat | awk '{print $1}')
          echo "SHA256: $SHA256"
          
          echo "$SHA256  zkeen.dat" > zkeen.dat.sha256
          
          NOTES="![downloads](https://img.shields.io/github/downloads/jameszeroX/zkeen-domains/${TAG}/total?label=downloads)"

          if gh release view "$TAG" > /dev/null 2>&1; then
            echo "Релиз с тегом $TAG уже существует. Обновление не требуется."
            exit 0
          fi

          gh release create "$TAG" \
            zkeen.dat \
            zkeen.dat.sha256 \
            --title "$RELEASE_NAME" \
            --notes "$NOTES"