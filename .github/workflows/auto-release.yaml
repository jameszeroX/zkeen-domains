name: Auto Release GeoSite

on:
  push:
    branches:
      - master
    paths:
      - 'release/**'
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Import GPG key
        uses: crazy-max/ghaction-import-gpg@v7
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          git_user_signingkey: true
          git_commit_gpgsign: true
          git_tag_gpgsign: true
          git_config_global: true

      - name: Parse Date, Format Name and Create Release
        id: release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd release

          MARKER_FILE=$(ls | grep -E '^[0-9]{6}$' | head -n 1)

          if [ -z "$MARKER_FILE" ]; then
            echo "Маркерный файл не найден в папке release. Пропуск."
            exit 0
          fi

          TAG=$MARKER_FILE

          echo "TAG=$TAG" >> $GITHUB_OUTPUT
          echo "tag_name=$TAG" >> $GITHUB_OUTPUT

          YY=${TAG:0:2}
          MM=${TAG:2:2}
          DD=${TAG:4:2}

          MM=$((10#$MM))
          DD=$((10#$DD))

          RELEASE_NAME="zkeen-domains-${YY}.${MM}.${DD}"
          echo "RELEASE_NAME=$RELEASE_NAME" >> $GITHUB_OUTPUT

          if [ ! -f "zkeen.dat" ]; then
            echo "Ошибка: Файл zkeen.dat не найден в папке release!"
            exit 1
          fi

          SHA256=$(sha256sum zkeen.dat | awk '{print $1}')
          echo "SHA256: $SHA256"

          echo "$SHA256  zkeen.dat" > zkeen.dat.sha256

          NOTES="![downloads](https://img.shields.io/github/downloads/jameszeroX/zkeen-domains/${TAG}/total?label=downloads)"

          echo "$NOTES" > /tmp/release_notes.md

          # Проверяем существование тега
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Тег $TAG уже существует. Проверяем, нужно ли обновлять релиз..."
            if gh release view "$TAG" > /dev/null 2>&1; then
              echo "Релиз с тегом $TAG уже существует. Обновление не требуется."
              exit 0
            fi
          fi

          # Создаем подписанный тег
          echo "Создание подписанного тега $TAG..."
          git tag -s "$TAG" -m "Release $RELEASE_NAME"

          # Пушим тег
          git push origin "$TAG"

          # Создаем релиз с использованием файла notes
          gh release create "$TAG" \
            zkeen.dat \
            zkeen.dat.sha256 \
            --title "$RELEASE_NAME" \
            --notes-file /tmp/release_notes.md \
            --verify-tag

      - name: Verify Signed Tag
        if: steps.release.outputs.TAG != ''
        run: |
          TAG="${{ steps.release.outputs.TAG }}"
          echo "Проверка подписи тега: $TAG"

          if [ -z "$TAG" ]; then
            echo "❌ Тег не найден"
            exit 1
          fi

          # Проверяем существование тега
          if ! git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "❌ Тег $TAG не существует"
            exit 1
          fi

          # Верифицируем подпись
          if git tag -v "$TAG" 2>&1; then
            echo "✅ Тег $TAG успешно подписан и верифицирован!"
          else
            echo "⚠️ Предупреждение: Не удалось верифицировать подпись тега $TAG"
          fi